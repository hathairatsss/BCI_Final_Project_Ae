<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCI Debug Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .status {
            text-align: center;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 20px;
        }
        .status.connected {
            color: #27ae60;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .full-width {
            grid-column: span 2;
        }
        .metrics-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .metrics-table th, .metrics-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        .metrics-table th {
            background-color: #f2f2f2;
            color: #333;
        }
        .metrics-table tr:nth-child(even){background-color: #f9f9f9;}
        .average-row {
            font-weight: bold;
            background-color: #e8f4f8 !important;
        }
    </style>
</head>
<body>

    <h1>BCI Debug Dashboard</h1>
    <div id="connection-status" class="status">Connecting to WebSocket...</div>

    <div class="grid-container">
        <!-- Raw Data Chart -->
        <div class="card">
            <h3 style="margin-top:0; color:#2c3e50;">Raw EEG Data (Latest 1s)</h3>
            <div id="raw-chart" style="width:100%; height:350px;"></div>
        </div>

        <!-- FFT Spectrum Chart -->
        <div class="card">
            <h3 style="margin-top:0; color:#2c3e50;">FFT Spectrum (0-40 Hz)</h3>
            <div id="fft-chart" style="width:100%; height:350px;"></div>
        </div>

        <!-- Attention Metrics Bar Chart -->
        <div class="card full-width">
            <h3 style="margin-top:0; color:#2c3e50;">Attention Metrics by Channel</h3>
            <div id="metrics-chart" style="width:100%; height:350px;"></div>
        </div>

        <!-- Attention Metrics Table -->
        <div class="card full-width">
            <h3 style="margin-top:0; color:#2c3e50;">Metrics Data Table</h3>
            <table class="metrics-table" id="metrics-table">
                <thead>
                    <tr>
                        <th>Channel</th>
                        <th>Beta / Alpha</th>
                        <th>Beta / (Theta + Alpha)</th>
                        <th>1 / Alpha</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Rows will be populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const wsUrl = "ws://localhost:8000/ws/dashboard";
        let ws;
        
        const statusEl = document.getElementById('connection-status');
        const tbody = document.querySelector('#metrics-table tbody');

        // Initialize Plotly Charts
        const rawLayout = {
            margin: { t: 10, b: 30, l: 40, r: 10 },
            xaxis: { title: 'Samples' },
            yaxis: { title: 'Amplitude (µV)' },
            showlegend: true,
            legend: { x: 1, y: 1 }
        };
        const fftLayout = {
            margin: { t: 10, b: 30, l: 40, r: 10 },
            xaxis: { title: 'Frequency (Hz)' },
            yaxis: { title: 'Power', type: 'log' }, // Log scale for PSD is usually better
            showlegend: true,
            legend: { x: 1, y: 1 }
        };
        const metricsLayout = {
            barmode: 'group',
            margin: { t: 10, b: 30, l: 40, r: 10 },
            yaxis: { title: 'Calculated Score' },
            showlegend: true
        };

        Plotly.newPlot('raw-chart', [], rawLayout, {responsive: true});
        Plotly.newPlot('fft-chart', [], fftLayout, {responsive: true});
        Plotly.newPlot('metrics-chart', [], metricsLayout, {responsive: true});

        function connectWebSocket() {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusEl.textContent = "Connected to Server (4 Hz Stream)";
                statusEl.className = "status connected";
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if(data && Object.keys(data.raw_data).length > 0) {
                    updateDashboard(data);
                }
            };

            ws.onclose = () => {
                statusEl.textContent = "Disconnected. Reconnecting in 2s...";
                statusEl.className = "status";
                setTimeout(connectWebSocket, 2000);
            };

            ws.onerror = (err) => {
                console.error("WebSocket Error:", err);
            };
        }

        function updateDashboard(data) {
            const channels = Object.keys(data.raw_data);
            
            // 1. Update Raw Data
            const rawTraces = channels.map(ch => ({
                x: Array.from({length: data.raw_data[ch].length}, (_, i) => i),
                y: data.raw_data[ch],
                name: ch,
                type: 'scatter',
                mode: 'lines',
                line: { width: 1 }
            }));
            Plotly.react('raw-chart', rawTraces, rawLayout);

            // 2. Update FFT Data
            if (data.fft_data.frequencies.length > 0) {
                const fftTraces = channels.map(ch => ({
                    x: data.fft_data.frequencies,
                    y: data.fft_data.psd[ch],
                    name: ch,
                    type: 'scatter',
                    mode: 'lines',
                    line: { width: 1.5 }
                }));
                Plotly.react('fft-chart', fftTraces, fftLayout);
            }

            // 3. Update Metrics Bar Chart
            const betaAlphaTrace = {
                x: channels,
                y: channels.map(ch => data.metrics[ch].beta_alpha),
                name: 'Beta / Alpha',
                type: 'bar'
            };
            const betaThetaAlphaTrace = {
                x: channels,
                y: channels.map(ch => data.metrics[ch].beta_theta_alpha),
                name: 'Beta / (Theta + Alpha)',
                type: 'bar'
            };
            const oneOverAlphaTrace = {
                x: channels,
                y: channels.map(ch => data.metrics[ch].one_over_alpha),
                name: '1 / Alpha',
                type: 'bar'
            };
            Plotly.react('metrics-chart', [betaAlphaTrace, betaThetaAlphaTrace, oneOverAlphaTrace], metricsLayout);

            // 4. Update Table
            let html = '';
            channels.forEach(ch => {
                html += `
                    <tr>
                        <td>${ch}</td>
                        <td>${data.metrics[ch].beta_alpha.toFixed(3)}</td>
                        <td>${data.metrics[ch].beta_theta_alpha.toFixed(3)}</td>
                        <td>${data.metrics[ch].one_over_alpha.toFixed(3)}</td>
                    </tr>
                `;
            });
            // Add Average Row
            html += `
                <tr class="average-row">
                    <td>AVERAGE</td>
                    <td>${data.avg_metrics.beta_alpha.toFixed(3)}</td>
                    <td>${data.avg_metrics.beta_theta_alpha.toFixed(3)}</td>
                    <td>${data.avg_metrics.one_over_alpha.toFixed(3)}</td>
                </tr>
            `;
            tbody.innerHTML = html;
        }

        // Start connection
        connectWebSocket();
    </script>
</body>
</html>
