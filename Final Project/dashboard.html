<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCI Debug Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .status {
            text-align: center;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 20px;
        }
        .status.connected {
            color: #27ae60;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .full-width {
            grid-column: span 2;
        }
        .metrics-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .metrics-table th, .metrics-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        .metrics-table th {
            background-color: #f2f2f2;
            color: #333;
        }
        .metrics-table tr:nth-child(even){background-color: #f9f9f9;}
        .average-row {
            font-weight: bold;
            background-color: #e8f4f8 !important;
        }
    </style>
</head>
<body>

    <h1>BCI Debug Dashboard</h1>
    <div id="connection-status" class="status">Connecting to WebSocket...</div>

    <div class="grid-container">
        <!-- Raw Data Chart -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin-top:0; color:#2c3e50;">Time Series (5s)</h3>
                <div>
                    <label for="v-scale" style="font-weight:bold; margin-right:5px; font-size: 12px;">Vert Scale:</label>
                    <select id="v-scale" style="padding:5px; border-radius:4px;">
                        <option value="50">50 uV</option>
                        <option value="100">100 uV</option>
                        <option value="200" selected>200 uV</option>
                        <option value="500">500 uV</option>
                        <option value="1000">1000 uV</option>
                    </select>
                </div>
            </div>
            <div id="raw-chart" style="width:100%; height:650px;"></div>
        </div>

        <!-- FFT Spectrum Chart -->
        <div class="card">
            <h3 style="margin-top:0; color:#2c3e50;">FFT Spectrum (0-40 Hz)</h3>
            <div id="fft-chart" style="width:100%; height:650px;"></div>
        </div>

        <!-- Attention Metrics Bar Chart -->
        <div class="card full-width">
            <h3 style="margin-top:0; color:#2c3e50;">Attention Metrics by Channel</h3>
            <div id="metrics-chart" style="width:100%; height:350px;"></div>
        </div>

        <!-- Attention Metrics Table -->
        <div class="card full-width">
            <h3 style="margin-top:0; color:#2c3e50;">Metrics Data Table</h3>
            <table class="metrics-table" id="metrics-table">
                <thead>
                    <tr>
                        <th>Channel</th>
                        <th>Beta / Alpha</th>
                        <th>Beta / (Theta + Alpha)</th>
                        <th>1 / Alpha</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Rows will be populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const wsUrl = "ws://localhost:8000/ws/dashboard";
        let ws;
        
        const statusEl = document.getElementById('connection-status');
        const tbody = document.querySelector('#metrics-table tbody');

        // Initialize Plotly Charts
        let currentScale = 200;
        
        const rawLayout = {
            margin: { t: 30, b: 30, l: 30, r: 10 },
            grid: { rows: 8, columns: 1, pattern: 'independent' },
            showlegend: false,
            annotations: []
            // Programmatically update y-axis scales later
        };
        // Add all 8 y-axes dynamically
        for (let i = 1; i <= 8; i++) {
            rawLayout[`yaxis${i === 1 ? '' : i}`] = { 
                range: [-currentScale, currentScale],
                zeroline: false,
                title: { text: `Ch${i}`, font: {size: 10} }
            };
            rawLayout[`xaxis${i === 1 ? '' : i}`] = {
                range: [-5, 0],
                showticklabels: i === 8 // Only show x-axis labels on the bottom chart
            };
        }

        const fftLayout = {
            margin: { t: 30, b: 30, l: 40, r: 10 },
            xaxis: { title: 'Frequency (Hz)' },
            yaxis: { title: 'Power', type: 'log' }, // Log scale for PSD is usually better
            showlegend: true,
            legend: { x: 1, y: 1 }
        };
        const metricsLayout = {
            barmode: 'group',
            margin: { t: 10, b: 30, l: 40, r: 10 },
            yaxis: { title: 'Calculated Score' },
            showlegend: true
        };

        Plotly.newPlot('raw-chart', [], rawLayout, {responsive: true});
        Plotly.newPlot('fft-chart', [], fftLayout, {responsive: true});
        Plotly.newPlot('metrics-chart', [], metricsLayout, {responsive: true});

        function connectWebSocket() {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusEl.textContent = "Connected to Server (4 Hz Stream)";
                statusEl.className = "status connected";
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if(data && Object.keys(data.raw_data).length > 0) {
                    updateDashboard(data);
                }
            };

            ws.onclose = () => {
                statusEl.textContent = "Disconnected. Reconnecting in 2s...";
                statusEl.className = "status";
                setTimeout(connectWebSocket, 2000);
            };

            ws.onerror = (err) => {
                console.error("WebSocket Error:", err);
            };
        }

        document.getElementById('v-scale').addEventListener('change', (e) => {
            currentScale = parseInt(e.target.value);
            for (let i = 1; i <= 8; i++) {
                rawLayout[`yaxis${i === 1 ? '' : i}`].range = [-currentScale, currentScale];
            }
            Plotly.relayout('raw-chart', rawLayout);
        });

        function updateDashboard(data) {
            const channels = Object.keys(data.raw_data);
            
            // 1. Update Raw Data (Time Series Subplots)
            const rawTraces = channels.map((ch, i) => {
                const dataLen = data.raw_data[ch].length;
                // Calculate time from -5s to 0s based on index (assuming 250Hz sampling rate)
                const xValues = Array.from({length: dataLen}, (_, idx) => -(dataLen - 1 - idx) / 250);
                
                return {
                    x: xValues,
                    y: data.raw_data[ch],
                    name: ch,
                    type: 'scatter',
                    mode: 'lines',
                    line: { width: 1 },
                    xaxis: 'x' + (i === 0 ? '' : (i + 1)),
                    yaxis: 'y' + (i === 0 ? '' : (i + 1)),
                };
            });
            
            // Generate annotations for uVrms
            rawLayout.annotations = channels.map((ch, i) => {
                const rms = data.metrics[ch].rms || 0;
                return {
                    xref: 'x' + (i === 0 ? '' : (i + 1)),
                    yref: 'y' + (i === 0 ? '' : (i + 1)) + ' domain',
                    x: 0,
                    y: 0.05, // Just slightly above the bottom of the subplot
                    xanchor: 'right',
                    yanchor: 'bottom',
                    text: `${rms.toFixed(1)} uVrms`,
                    showarrow: false,
                    font: { color: '#f39c12', size: 11, weight: 'bold' } // orange/gold color similar to OpenBCI
                };
            });

            Plotly.react('raw-chart', rawTraces, rawLayout);

            // 2. Update FFT Data
            if (data.fft_data.frequencies.length > 0) {
                const fftTraces = channels.map(ch => ({
                    x: data.fft_data.frequencies,
                    y: data.fft_data.psd[ch],
                    name: ch,
                    type: 'scatter',
                    mode: 'lines',
                    line: { width: 1.5 }
                }));
                Plotly.react('fft-chart', fftTraces, fftLayout);
            }

            // 3. Update Metrics Bar Chart
            const betaAlphaTrace = {
                x: channels,
                y: channels.map(ch => data.metrics[ch].beta_alpha),
                name: 'Beta / Alpha',
                type: 'bar'
            };
            const betaThetaAlphaTrace = {
                x: channels,
                y: channels.map(ch => data.metrics[ch].beta_theta_alpha),
                name: 'Beta / (Theta + Alpha)',
                type: 'bar'
            };
            const oneOverAlphaTrace = {
                x: channels,
                y: channels.map(ch => data.metrics[ch].one_over_alpha),
                name: '1 / Alpha',
                type: 'bar'
            };
            Plotly.react('metrics-chart', [betaAlphaTrace, betaThetaAlphaTrace, oneOverAlphaTrace], metricsLayout);

            // 4. Update Table
            let html = '';
            channels.forEach(ch => {
                html += `
                    <tr>
                        <td>${ch}</td>
                        <td>${data.metrics[ch].beta_alpha.toFixed(3)}</td>
                        <td>${data.metrics[ch].beta_theta_alpha.toFixed(3)}</td>
                        <td>${data.metrics[ch].one_over_alpha.toFixed(3)}</td>
                    </tr>
                `;
            });
            // Add Average Row
            html += `
                <tr class="average-row">
                    <td>AVERAGE</td>
                    <td>${data.avg_metrics.beta_alpha.toFixed(3)}</td>
                    <td>${data.avg_metrics.beta_theta_alpha.toFixed(3)}</td>
                    <td>${data.avg_metrics.one_over_alpha.toFixed(3)}</td>
                </tr>
            `;
            tbody.innerHTML = html;
        }

        // Start connection
        connectWebSocket();
    </script>
</body>
</html>
